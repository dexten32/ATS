<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starting ATS</title>
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #0f172a;
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ambient Background Animation */
        .ambient-bg {
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 70%);
            animation: rotate 10s linear infinite;
            z-index: 0;
            opacity: 0.6;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .starting-text {
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 0.1em;
            color: var(--text);
            opacity: 0.9;
            display: flex;
            align-items: baseline;
            gap: 2px;
        }

        .dots {
            display: inline-block;
            width: 30px;
            text-align: left;
        }

        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: var(--primary);
            filter: blur(80px);
            opacity: 0.15;
            z-index: -1;
            animation: pulse 3s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.1; transform: translate(-50%, -50%) scale(0.8); }
            to { opacity: 0.2; transform: translate(-50%, -50%) scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>
    <div class="glow"></div>
    <div class="container">
        <div class="starting-text">
            ATS Starting<span class="dots" id="dots">.</span>
        </div>
    </div>

    <script>
        const dotsElement = document.getElementById('dots');
        let count = 1;
        setInterval(() => {
            count = (count % 3) + 1;
            dotsElement.textContent = '.'.repeat(count);
        }, 600);
    </script>
</body>
</html>
